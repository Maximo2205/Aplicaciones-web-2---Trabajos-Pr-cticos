<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chkCompatibility — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../front-user/style/style.css">
  <link rel="stylesheet" href="style/adminPage.css">
</head>

<body>

  <header>
    <div class="logo"><span>chk</span>Compatibility</div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="catalogo.html">Catálogo</a>
      <a href="#" class="nav-active">Admin</a>
    </nav>
  </header>

  <div class="admin-layout">

    <!-- Encabezado de la sección -->
    <div class="admin-header">
      <div>
        <div class="admin-badge">Panel de administración</div>
        <h1 class="admin-title">Componentes</h1>
      </div>
      <button class="btn-primary" id="btn-agregar">+ Agregar componente</button>
    </div>

    <!-- Tabla -->
    <div class="tabla-wrapper">
      <table class="tabla-admin" id="tabla-admin">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Socket</th>
            <th>Chipset</th>
            <th>DDR</th>
            <th>Detalle</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-body"></tbody>
      </table>
      <div id="tabla-estado" class="tabla-estado"></div>
    </div>

  </div>

  <!-- Modal agregar / editar -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Agregar componente</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-grid">

          <div class="form-group form-full">
            <label>Nombre</label>
            <input type="text" id="f-name" placeholder="Ej: AMD Ryzen 5 9600X">
          </div>

          <div class="form-group">
            <label>Categoría</label>
            <select id="f-category">
              <option value="">— Seleccionar —</option>
              <option value="cpu">CPU</option>
              <option value="motherboard">Motherboard</option>
              <option value="ram">RAM</option>
              <option value="cpuCooler">CPU Cooler</option>
              <option value="gpu">GPU</option>
              <option value="M2">M.2</option>
              <option value="chassis">Gabinete</option>
              <option value="psu">Fuente</option>
            </select>
          </div>

          <div class="form-group">
            <label>Socket CPU <span class="form-hint">(comas para múltiples)</span></label>
            <input type="text" id="f-cpuSocket" placeholder="Ej: AM5 o LGA1700, AM5">
          </div>

          <div class="form-group">
            <label>Chipset <span class="form-hint">(comas para múltiples)</span></label>
            <input type="text" id="f-cpuChipset" placeholder="Ej: X870, B650">
          </div>

          <div class="form-group">
            <label>DDR</label>
            <input type="number" id="f-ramDdr" placeholder="Ej: 5">
          </div>

          <div class="form-group">
            <label>Altura cooler <span class="form-hint">(mm)</span></label>
            <input type="number" id="f-coolerHeight" placeholder="Ej: 158">
          </div>

          <div class="form-group">
            <label>Formato M.2 <span class="form-hint">(comas para múltiples)</span></label>
            <input type="text" id="f-m2Format" placeholder="Ej: 2280, 22110">
          </div>

          <div class="form-group">
            <label>Key M.2</label>
            <input type="text" id="f-m2Key" placeholder="Ej: M">
          </div>

          <div class="form-group">
            <label>Formato PSU <span class="form-hint">(comas para múltiples)</span></label>
            <input type="text" id="f-psuFormat" placeholder="Ej: ATX, SFX">
          </div>

          <div class="form-group">
            <label>PCIe GPU</label>
            <input type="number" id="f-gpuPcie" placeholder="Ej: 5">
          </div>

          <div class="form-group">
            <label>Longitud GPU <span class="form-hint">(mm)</span></label>
            <input type="number" id="f-gpuLenght" placeholder="Ej: 340">
          </div>

          <div class="form-group">
            <label>Factor de forma MB <span class="form-hint">(comas para múltiples)</span></label>
            <input type="text" id="f-mbFormat" placeholder="Ej: ATX, Micro-ATX">
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancelar">Cancelar</button>
        <button class="btn-primary" id="btn-guardar">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal confirmación de borrado -->
  <div class="modal-overlay" id="confirm-overlay">
    <div class="modal modal-sm" id="confirm-modal">
      <div class="modal-header">
        <span class="modal-title">Confirmar eliminación</span>
        <button class="modal-close" id="confirm-close">✕</button>
      </div>
      <div class="modal-body">
        <p class="confirm-texto">¿Estás seguro que querés eliminar <strong id="confirm-nombre"></strong>? Esta acción no
          se puede deshacer.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="confirm-cancelar">Cancelar</button>
        <button class="btn-danger" id="confirm-ok">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- Modal detalle -->
  <div class="modal-overlay" id="detalle-overlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <div class="detalle-modal-titulo">
          <span class="td-categoria" id="detalle-category"></span>
          <span class="modal-title" id="detalle-name"></span>
        </div>
        <button class="modal-close" id="detalle-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="detalle-grid" id="detalle-grid"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="detalle-cerrar">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="scripts/adminPage.mjs"></script>
</body>

</html>
