<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chkCompatibility</title>
</head>

<body>
    <header class="navbar">
        <h1>Compatibilidad</h1>
    </header>
      
      <main class="container">
          <section class="content">
          <h2>Componentes disponibles</h2>
      
          <div class="grid">
      
            <div class="card">
              <h3>Ryzen 7 5800X</h3>
              <p>CPU</p>
              <button>Seleccionar</button>
            </div>
      
            <div class="card">
              <h3>RTX 3060</h3>
              <p>GPU</p>
              <button>Seleccionar</button>
            </div>
      
            <div class="card">
              <h3>ASUS B550M</h3>
              <p>Motherboard</p>
              <button>Seleccionar</button>
            </div>
      
            <div class="card">
              <h3>Gabinete ATX</h3>
              <p>Gabinete</p>
              <button>Seleccionar</button>
            </div>
      
          </div>
          </section>
      
        <section class="build">
          <h2>Tu PC</h2>
      
          <p>No seleccionaste componentes</p>
      
          <button class="btn-check">Ver compatibilidad</button>
      
          <p class="resultado">✔ Compatible</p>
        </section>
      
      </main>
</body>

</html>
